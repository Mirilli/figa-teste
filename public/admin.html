<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – GranoVita</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0F0B07;--surface:#1A1208;--card:#221A0C;--border:#3A2A16;
      --caramel:#C6954A;--brown:#7A4F2B;--cream:#FAF6EE;--tan:#E8D9BF;
      --text:#D4C4A8;--text-muted:#7A6048;--green:#5A7A50;--green-lt:#2A3A28;
      --red:#C0392B;--red-lt:#3A1A18;--blue:#2980B9;--blue-lt:#1A2A3A;
      --yellow:#F39C12;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6;min-height:100vh}
    h1,h2,h3{font-family:'Playfair Display',serif}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer}

    /* LOGIN */
    #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
    .login-logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--caramel);margin-bottom:4px}
    .login-sub{color:var(--text-muted);font-size:.85rem;margin-bottom:32px}
    .form-group{margin-bottom:16px;text-align:left}
    .form-group label{display:block;font-size:.78rem;font-weight:500;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
    .form-input{width:100%;padding:12px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--caramel)}
    .form-submit{width:100%;padding:13px;background:var(--caramel);color:var(--bg);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;transition:background .2s;margin-top:4px}
    .form-submit:hover{background:#D4A858}
    .form-error{font-size:.78rem;color:#E74C3C;margin-top:8px;text-align:center;min-height:20px}

    /* LAYOUT */
    #app{display:none;min-height:100vh}
    #app.visible{display:flex}
    .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
    .sidebar-logo{padding:28px 24px;border-bottom:1px solid var(--border)}
    .sidebar-logo span{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--caramel)}
    .sidebar-logo .sub{font-size:.73rem;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;font-size:.88rem;font-weight:400;color:var(--text-muted);transition:all .2s;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-radius:0}
    .nav-item:hover{color:var(--cream);background:rgba(255,255,255,.04)}
    .nav-item.active{color:var(--caramel);background:rgba(198,149,74,.1);font-weight:500}
    .nav-item .icon{width:20px;text-align:center;font-size:1rem}
    .nav-section{padding:20px 24px 8px;font-size:.7rem;font-weight:600;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
    .sidebar-bottom{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
    .sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;background:rgba(255,255,255,.03)}
    .user-avatar-sm{width:32px;height:32px;border-radius:50%;background:var(--caramel);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--bg);font-weight:700;flex-shrink:0}
    .user-info-sm{flex:1;min-width:0}
    .user-name-sm{font-size:.82rem;font-weight:500;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-role-sm{font-size:.7rem;color:var(--text-muted)}
    .logout-btn{background:none;border:none;color:var(--text-muted);font-size:.85rem;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .2s;display:flex;align-items:center;gap:4px}
    .logout-btn:hover{color:var(--red)}

    .main{margin-left:240px;flex:1;min-height:100vh}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
    .page-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--cream)}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .content{padding:32px}

    /* CARDS */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
    .stat-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .stat-label{font-size:.78rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em}
    .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
    .icon-green{background:var(--green-lt);color:#6FCF97}
    .icon-blue{background:var(--blue-lt);color:#56CCF2}
    .icon-yellow{background:#2A2200;color:#F2C94C}
    .icon-orange{background:#2A1800;color:var(--caramel)}
    .stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--cream);margin-bottom:4px}
    .stat-sub{font-size:.78rem;color:var(--text-muted)}
    .stat-sub .up{color:#6FCF97} .stat-sub .dn{color:#EB5757}

    /* TABLES */
    .table-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:28px}
    .table-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
    .table-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream)}
    .table-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .search-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;padding:8px 14px;outline:none;transition:border-color .2s;width:200px}
    .search-input:focus{border-color:var(--caramel)}
    .filter-select{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;padding:8px 12px;outline:none;cursor:pointer}
    table{width:100%;border-collapse:collapse}
    th{padding:12px 16px;text-align:left;font-size:.74rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
    td{padding:14px 16px;font-size:.875rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .table-empty{text-align:center;padding:48px;color:var(--text-muted)}

    /* BADGES */
    .badge{display:inline-flex;align-items:center;font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.04em}
    .badge-pending{background:#2A2000;color:#F2C94C}
    .badge-awaiting_payment{background:#2A1800;color:var(--caramel)}
    .badge-paid{background:var(--blue-lt);color:#56CCF2}
    .badge-processing{background:var(--blue-lt);color:#56CCF2}
    .badge-shipped{background:#0A1A2A;color:#2F80ED}
    .badge-delivered{background:var(--green-lt);color:#6FCF97}
    .badge-cancelled{background:var(--red-lt);color:#EB5757}
    .badge-refunded{background:var(--red-lt);color:#EB5757}
    .badge-active{background:var(--green-lt);color:#6FCF97}
    .badge-inactive{background:var(--red-lt);color:#EB5757}

    /* ACTIONS */
    .action-btn{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--text-muted);padding:6px 12px;font-size:.78rem;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
    .action-btn:hover{border-color:var(--caramel);color:var(--caramel)}
    .action-btn.danger:hover{border-color:var(--red);color:var(--red)}

    /* CHARTS (CSS-only) */
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
    .chart-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);margin-bottom:20px}
    .bar-chart{display:flex;flex-direction:column;gap:12px}
    .bar-row{display:flex;align-items:center;gap:12px}
    .bar-label{font-size:.8rem;color:var(--text-muted);width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar-track{flex:1;background:rgba(255,255,255,.06);border-radius:100px;height:8px}
    .bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--brown),var(--caramel));transition:width .8s ease}
    .bar-val{font-size:.8rem;color:var(--text-muted);width:60px;text-align:right}
    .donut-chart{display:flex;align-items:center;gap:24px}
    .donut-legend{display:flex;flex-direction:column;gap:10px}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:.82rem}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    svg.donut{transform:rotate(-90deg)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:440px}
    .modal h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--cream);margin-bottom:6px}
    .modal p{color:var(--text-muted);font-size:.87rem;margin-bottom:20px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}
    .btn-cancel{background:transparent;border:1.5px solid var(--border);color:var(--text-muted);padding:9px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;transition:all .2s}
    .btn-cancel:hover{border-color:var(--text-muted);color:var(--cream)}
    .btn-confirm{background:var(--caramel);border:none;color:var(--bg);padding:9px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;transition:background .2s}
    .btn-confirm:hover{background:#D4A858}

    /* PAGINATION */
    .pagination{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-top:1px solid var(--border)}
    .page-info{font-size:.82rem;color:var(--text-muted)}
    .page-btns{display:flex;gap:6px}
    .page-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text-muted);padding:6px 12px;border-radius:7px;font-size:.82rem;font-family:'DM Sans',sans-serif;transition:all .2s}
    .page-btn:hover:not(:disabled){border-color:var(--caramel);color:var(--caramel)}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    .page-btn.active{background:var(--caramel);border-color:var(--caramel);color:var(--bg);font-weight:600}

    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);color:var(--cream);padding:12px 20px;border-radius:12px;font-size:.875rem;z-index:400;transform:translateY(80px);opacity:0;transition:all .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{border-color:var(--green);background:#1A2A1A}
    .toast.error{border-color:var(--red);background:#2A1010}

    /* MISC */
    .status-select{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:5px 8px;outline:none;transition:border-color .2s;cursor:pointer}
    .status-select:focus{border-color:var(--caramel)}
    .inline-input{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;padding:6px 10px;outline:none;width:90px;transition:border-color .2s}
    .inline-input:focus{border-color:var(--caramel)}
    .save-btn{background:var(--caramel);border:none;color:var(--bg);font-size:.78rem;font-weight:600;padding:6px 12px;border-radius:7px;margin-left:6px;transition:background .2s}
    .save-btn:hover{background:#D4A858}
    .refresh-btn{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--text-muted);padding:6px 12px;font-size:.82rem;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
    .refresh-btn:hover{border-color:var(--caramel);color:var(--caramel)}
    .avatar{width:28px;height:28px;border-radius:50%;background:var(--caramel);display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--bg);margin-right:8px;vertical-align:middle;flex-shrink:0}
    @media(max-width:1024px){.stat-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}}
    @media(max-width:768px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">GranoVita</div>
    <div class="login-sub">Painel Administrativo</div>
    <form onsubmit="adminLogin(event)">
      <div class="form-group"><label>E-mail</label><input type="email" class="form-input" id="adm-email" required placeholder="admin@granovita.com.br"/></div>
      <div class="form-group"><label>Senha</label><input type="password" class="form-input" id="adm-password" required placeholder="••••••••"/></div>
      <div class="form-error" id="adm-error"></div>
      <button type="submit" class="form-submit" id="adm-submit">Entrar no Painel</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>GranoVita</span>
      <div class="sub">Admin Panel</div>
    </div>
    <nav style="flex:1;overflow-y:auto;padding:16px 0">
      <button class="nav-item active" onclick="navigate('dashboard')"><span class="icon">📊</span>Dashboard</button>
      <div class="nav-section">Pedidos</div>
      <button class="nav-item" onclick="navigate('orders')"><span class="icon">📦</span>Todos os Pedidos</button>
      <div class="nav-section">Catálogo</div>
      <button class="nav-item" onclick="navigate('products')"><span class="icon">🥣</span>Produtos & Estoque</button>
      <div class="nav-section">Usuários</div>
      <button class="nav-item" onclick="navigate('users')"><span class="icon">👥</span>Clientes</button>
      <div class="nav-section">Segurança</div>
      <button class="nav-item" onclick="navigate('audit')"><span class="icon">🔍</span>Log de Auditoria</button>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar-sm" id="adm-avatar">A</div>
        <div class="user-info-sm">
          <div class="user-name-sm" id="adm-name">Admin</div>
          <div class="user-role-sm">Administrador</div>
        </div>
        <button class="logout-btn" onclick="adminLogout()">🚪</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="topbar-right">
        <button class="refresh-btn" onclick="refreshCurrent()">↻ Atualizar</button>
        <a href="/" target="_blank" class="action-btn">🌐 Ver Loja</a>
      </div>
    </div>
    <div class="content" id="content">
      <p style="color:var(--text-muted)">Carregando…</p>
    </div>
  </div>
</div>

<!-- STATUS MODAL -->
<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <h3>Atualizar Status</h3>
    <p>Pedido <strong id="modal-order-id">#0</strong></p>
    <div class="form-group">
      <label>Novo Status</label>
      <select class="form-input" id="modal-status" style="background:var(--surface);border-color:var(--border);color:var(--text)">
        <option value="awaiting_payment">Aguardando Pagamento</option>
        <option value="paid">Pago</option>
        <option value="processing">Processando</option>
        <option value="shipped">Enviado</option>
        <option value="delivered">Entregue</option>
        <option value="cancelled">Cancelado</option>
        <option value="refunded">Reembolsado</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmStatusUpdate()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let accessToken = null;
let currentPage = 'dashboard';
let pendingStatusOrderId = null;
const STATUS_LABEL = {
  pending:'Pendente', awaiting_payment:'Aguard. Pagto',
  paid:'Pago', processing:'Processando',
  shipped:'Enviado', delivered:'Entregue',
  cancelled:'Cancelado', refunded:'Reembolsado'
};

// ═══════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════
async function adminLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('adm-submit');
  const err = document.getElementById('adm-error');
  btn.disabled = true; btn.textContent = 'Entrando…'; err.textContent = '';
  try {
    const data = await api('/api/auth/login', 'POST', {
      email: document.getElementById('adm-email').value,
      password: document.getElementById('adm-password').value,
    });
    if (data.user.role !== 'admin') throw new Error('Acesso não autorizado.');
    accessToken = data.accessToken;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('adm-name').textContent = data.user.name.split(' ')[0];
    document.getElementById('adm-avatar').textContent = data.user.name[0].toUpperCase();
    navigate('dashboard');
  } catch(ex) {
    err.textContent = ex.message || 'Falha no login.';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar no Painel';
  }
}

async function adminLogout() {
  try { await api('/api/auth/logout', 'POST'); } catch {}
  accessToken = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
const PAGE_TITLES = { dashboard:'Dashboard', orders:'Pedidos', products:'Produtos & Estoque', users:'Clientes', audit:'Log de Auditoria' };

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach((n,i) => {
    const pages = ['dashboard','orders','products','users','audit'];
    n.classList.toggle('active', pages[i] === page);
  });
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  loadPage(page);
}

function refreshCurrent() { loadPage(currentPage); }

async function loadPage(page) {
  const content = document.getElementById('content');
  content.innerHTML = '<p style="color:var(--text-muted);padding:24px">Carregando…</p>';
  try {
    if (page === 'dashboard') await renderDashboard();
    else if (page === 'orders') await renderOrders();
    else if (page === 'products') await renderProducts();
    else if (page === 'users') await renderUsers();
    else if (page === 'audit') await renderAudit();
  } catch(ex) {
    content.innerHTML = `<p style="color:#EB5757;padding:24px">Erro ao carregar: ${ex.message}</p>`;
  }
}

// ═══════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════
async function renderDashboard() {
  const d = await api('/api/admin/dashboard');
  const c = document.getElementById('content');

  const rev = (d.orders.revenue_total || 0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const rev7 = (d.orders.revenue_7d || 0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

  const maxQty = Math.max(...(d.topProducts||[]).map(p=>p.qty_sold||0), 1);

  c.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-card-head"><span class="stat-label">Receita Total</span><div class="stat-icon icon-green">💰</div></div>
        <div class="stat-value">${rev}</div>
        <div class="stat-sub">Últ. 7 dias: <span class="up">${rev7}</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-head"><span class="stat-label">Pedidos</span><div class="stat-icon icon-blue">📦</div></div>
        <div class="stat-value">${d.orders.total||0}</div>
        <div class="stat-sub">Hoje: <span class="up">${d.orders.today||0}</span> · Pendentes: ${d.orders.pending||0}</div>
      </div>
      <div class="stat-card">

function buildDonut(o) {
  const total = (o.total||0) || 1;
  const data = [
    { v: o.paid||0, color:'#56CCF2' },
    { v: o.pending||0, color:'#F2C94C' },
    { v: o.shipped||0, color:'#2F80ED' },
    { v: o.cancelled||0, color:'#EB5757' },
  ];
  let offset = 0;
  const r = 40, circ = 2*Math.PI*r;
  const segments = data.map(d => {
    const pct = d.v / total;
    const dash = pct * circ;
    const seg = `<circle cx="50" cy="50" r="${r}" fill="none" stroke="${d.color}" stroke-width="16"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${-offset}" style="transition:stroke-dasharray .6s"/>`;
    offset += dash;
    return seg;
  });
  return `<svg class="donut" width="110" height="110" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="16"/>
    ${segments.join('')}
  </svg>`;
}

function openStatusModal(orderId, currentStatus) {
  pendingStatusOrderId = orderId;
  document.getElementById('modal-order-id').textContent = `#${orderId}`;
  document.getElementById('modal-status').value = currentStatus;
  document.getElementById('status-modal').classList.add('open');
}
function closeModal() { document.getElementById('status-modal').classList.remove('open'); }
async function confirmStatusUpdate() {
  if (!pendingStatusOrderId) return;
  try {
    await api(`/api/admin/orders/${pendingStatusOrderId}/status`, 'PATCH', {
      status: document.getElementById('modal-status').value
    });
    closeModal();
    showToast('Status atualizado com sucesso!', 'success');
    if (currentPage==='orders') renderOrders(ordersPage, ordersSearch, ordersStatus);
    else if (currentPage==='dashboard') renderDashboard();
  } catch(ex) { showToast('Erro: ' + ex.message, 'error'); }
}

async function updateStock(id) {

  try {

    showToast('Estoque atualizado!', 'success');
  } catch(ex) { showToast('Erro: '+ex.message,'error'); }

async function updatePrice(id) {
  const val = parseFloat(document.getElementById(`price-${id}`).value);
  if (isNaN(val)||val<=0) { showToast('Preço inválido','error'); return; }
  try {

// ═══════════════════════════════════════════════════════════
//  API HELPER
// ═══════════════════════════════════════════════════════════
async function api(url, method='GET', body=null) {
  const headers = { 'Content-Type':'application/json' };
  if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
  const res = await fetch(url, { method, headers, credentials:'include', body:body?JSON.stringify(body):null });

  if (res.status === 401 && url !== '/api/auth/login') {
    try {
      const r = await fetch('/api/auth/refresh', { method:'POST', credentials:'include' });
      if (r.ok) {
        const rd = await r.json();
        accessToken = rd.accessToken;
        headers['Authorization'] = `Bearer ${accessToken}`;
        const retry = await fetch(url, { method, headers, credentials:'include', body:body?JSON.stringify(body):null });
        if (!retry.ok) throw new Error('Sessão expirada.');
        return retry.json();
      }
    } catch {}
    adminLogout();
    throw new Error('Sessão expirada. Faça login novamente.');
  }

  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error || 'Erro na API.');
  }
  return res.json();
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}
