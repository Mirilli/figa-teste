# render.yaml — Configuração de deploy no Render
# Coloque este arquivo na raiz do projeto e faça push para o GitHub.
# No painel do Render, escolha "Blueprint" e ele configurará tudo automaticamente.

services:
  - type: web
    name: granovita
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health

    # Variáveis de ambiente — configure os valores secretos
    # no painel do Render (não commite valores reais aqui!)
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # Preenchida automaticamente pelo Render ao linkar o banco abaixo
      - key: DATABASE_URL
        fromDatabase:
          name: granovita-db
          property: connectionString

      # ⚠️  Configure manualmente no painel do Render:
      - key: BASE_URL
        sync: false        # ex: https://granovita.onrender.com

      - key: JWT_ACCESS_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_ACCESS_EXPIRES
        value: 15m

      - key: JWT_REFRESH_EXPIRES
        value: 7d

      - key: MP_ACCESS_TOKEN
        sync: false       # cole seu token do Mercado Pago

      - key: MP_WEBHOOK_SECRET
        sync: false       # cole o segredo do webhook do MP

      - key: ADMIN_EMAIL
        sync: false       # ex: admin@granovita.com.br

      - key: ADMIN_PASSWORD
        sync: false       # senha forte do admin

      - key: SHIPPING_COST
        value: "15.90"

      - key: FREE_SHIPPING_THRESHOLD
        value: "100"

      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"

      - key: RATE_LIMIT_MAX
        value: "100"

      - key: LOGIN_RATE_LIMIT_MAX
        value: "5"

databases:
  - name: granovita-db
    databaseName: granovita
    user: granovita
    plan: free           # plano gratuito do Render PostgreSQL
